name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest]
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
      # MorkServer dev-links MORK + PathMap via [sources] paths (../MORK, ../PathMap);
      # MORK in turn dev-links ../PathMap. Clone both siblings before instantiation.
      - name: Clone PathMap + MORK (path [sources] dependencies)
        run: |
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/PathMap.git ../PathMap
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORK.git ../MORK
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  format:
    name: Format (Blue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - name: Check formatting
        run: |
          julia -e 'using Pkg; Pkg.add(PackageSpec(name="JuliaFormatter", version="2.5.2"))'
          julia -e 'using JuliaFormatter; format(".")'
          if ! git diff --quiet; then
            echo "::error::Not Blue-formatted:"; git --no-pager diff --stat; exit 1
          fi
          echo "All files Blue-formatted."
